<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Day 1</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right, #2276d5, #83aae9);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    width: 330px;
}

h1{
    margin-bottom: 20px;
}

input{
    width: 80%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover{
    opacity: 0.9;
}

.welcomeBtn{
    background-color: #4CAF50;
    color: white;
}

.resetBtn{
    background-color: #f44336;
    color: white;
}

.main-text{
    color: #f07604;
    font-weight: bold;
    font-size: 18px;
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="container">

<h1 id="MainHeader">JavaScript Day 1</h1>

<p id="intro"></p>

<label for="viewerName">Enter Your Name:</label><br>
<input type="text" id="viewerID" name="viewerName">

<br>

<button class="welcomeBtn" onclick="displayWelcome()">Welcome</button>
<button class="resetBtn" onclick="resetText()">Reset</button>

</div>

<script>

function displayWelcome(){

    let viewerName = document.getElementById("viewerID").value;
    let welcomeMessage = "Welcome " + viewerName + " to JavaScript Day 1!";

    const mainHeader = document.getElementById("MainHeader");
    mainHeader.innerHTML = welcomeMessage;
    mainHeader.style.color = "#1976d2";
    mainHeader.style.backgroundColor = "#fff9c4";

    const intro = document.getElementById("intro");
    intro.innerHTML = "This is the first day of learning JavaScript. We will learn the basics of JavaScript and how to manipulate the DOM.";
    intro.classList.add("main-text");
}

function resetText(){

    const mainHeader = document.getElementById("MainHeader");
    mainHeader.innerHTML = "JavaScript Day 1";
    mainHeader.style.color = "black";
    mainHeader.style.backgroundColor = "white";

    const intro = document.getElementById("intro");
    intro.innerHTML = "";
    intro.classList.remove("main-text");

    document.getElementById("viewerID").value = "";
}

</script>

</body>
</html>
